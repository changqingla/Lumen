upstream backend_api {
    server reader_src:13000;
}

upstream minio_server {
    # MinIO 在 Docker 网络内
    server reader_minio:9000;
}

# HTTP 服务器 - 处理 HTTP 请求和证书验证
server {
    listen 80;
    server_name ireader.online www.ireader.online;
    
    client_max_body_size 100M;
    
    access_log /var/log/nginx/reader_qaq_access.log;
    error_log /var/log/nginx/reader_qaq_error.log;
    
    # Let's Encrypt 证书验证路径（保留用于证书续期）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # 后端 API (HTTP)
    location /api/ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        
        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
    
    # MinIO (HTTP)
    location /minio/ {
        rewrite ^/minio/(.*)$ /$1 break;
        proxy_pass http://minio_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # 前端静态文件 (HTTP)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS 服务器 - SSL 配置
server {
    listen 443 ssl;
    http2 on;
    server_name ireader.online www.ireader.online;
    
    client_max_body_size 100M;
    
    # SSL 证书配置
    ssl_certificate /etc/letsencrypt/live/ireader.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ireader.online/privkey.pem;
    
    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    access_log /var/log/nginx/reader_qaq_ssl_access.log;
    error_log /var/log/nginx/reader_qaq_ssl_error.log;
    
    # 后端 API
    location /api/ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        
        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
    
    # MinIO
    location /minio/ {
        rewrite ^/minio/(.*)$ /$1 break;
        proxy_pass http://minio_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # 前端静态文件
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        
        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # HTML 不缓存
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
    
    # 健康检查
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
