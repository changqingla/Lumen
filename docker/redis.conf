# Redis 配置文件 - File2MD 项目

# 网络配置
bind 0.0.0.0
port 6378
protected-mode yes

# 认证配置
requirepass agent123
# ACL 用户配置
user default off
user reader on >agent123 ~* &* +@all

# 内存配置
maxmemory 1024mb
maxmemory-policy allkeys-lru

# 持久化配置 - RDB
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# AOF 配置
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 日志配置
loglevel notice
logfile ""

# 客户端配置
timeout 300
tcp-keepalive 300
tcp-backlog 511
maxclients 10000

# 数据库配置
databases 16

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 延迟监控
latency-monitor-threshold 100

# 安全配置 - 禁用危险命令
rename-command FLUSHDB ""
rename-command FLUSHALL ""
# rename-command KEYS ""
rename-command CONFIG "CONFIG_reader_secure"
rename-command SHUTDOWN "SHUTDOWN_reader_secure"

# 性能配置
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# 通知配置
notify-keyspace-events ""

# 高级配置
hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes
